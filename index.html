<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contatos</title>
</head>
<body>
    <div class="container">
        <h1>Agenda de Contatos</h1>
        <div class="inserir-contato">
            <input type="text" id="inputAdicionarContato" placeholder="Digite o nome do seu contato...">
            <input type="number" id="inputAdicionarNumero" placeholder="Digite o número do seu contato...">
            <input type="text" id="inputAdicionarObs" placeholder="Digite uma observação do seu contato...">
            <button id="button">➤</button>
        </div>
        <h2>Contatos Salvos:</h2>
        <div id="display"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
